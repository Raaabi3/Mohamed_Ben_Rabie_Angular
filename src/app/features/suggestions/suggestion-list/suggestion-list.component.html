<div class="list-group">
	<div class="list-group-item" *ngFor="let suggestion of suggestions">
		<div class="d-flex justify-content-between align-items-center">
			<div>
				<h5 class="mb-1">{{ suggestion.title }}</h5>
				<p class="mb-1 text-muted">{{ suggestion.description }}</p>
			</div>
			<button class="btn btn-primary" [routerLink]="[suggestion.id]">Details</button>
		</div>
	</div>
</div>
